<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>职引官 · AI面试实战平台</title>
    <!-- 字体与图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 图表库（用于雷达图） -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f7ee;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 手机容器 */
        .phone {
    max-width: 400px;
    width: 100%;
    background-color: white;
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 20px rgba(0,40,0,0.1);
    height: 100vh; /* 添加这一行 - 固定高度 */
    overflow: hidden; /* 添加这一行 - 隐藏溢出 */
}

        /* 主内容区域 - 可滚动 */
       .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 20px;
    scrollbar-width: thin;
    scrollbar-color: #2c6e2c #e0f0e0;
    -webkit-overflow-scrolling: touch; /* 添加这一行 - 平滑滚动 */
}

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background-color: #2c6e2c;
            border-radius: 4px;
        }

        /* 底部导航栏 */
        .bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 0 12px;
    background-color: white;
    border-top: 1px solid #e0f0e0;
    box-shadow: 0 -2px 10px rgba(0,30,0,0.03);
}
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8a9e8a;
            font-size: 12px;
            transition: 0.2s;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #2c6e2c;
            font-weight: 600;
        }

        /* 板块标题 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a3a1a;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: #2c6e2c;
            font-size: 20px;
        }

        /* 卡片样式 */
        .card {
            background-color: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(0,40,0,0.05);
            border: 1px solid #e0f0e0;
        }

        /* 知识库卡片 - 双列 */
        .knowledge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .knowledge-item {
            background: white;
            border-radius: 20px;
            padding: 16px 12px;
            border: 1px solid #e0f0e0;
            box-shadow: 0 2px 8px rgba(0,30,0,0.02);
            cursor: pointer;
            transition: 0.2s;
        }
        .knowledge-item:active {
            background-color: #f0f7ee;
        }

        .company-tag {
            background-color: #e8f3e5;
            color: #2c6e2c;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .position-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
            color: #1e3a1e;
        }

        .question-preview {
            font-size: 13px;
            color: #4f6b4f;
            margin: 8px 0;
            line-height: 1.4;
        }

        .type-badge {
            font-size: 11px;
            background-color: #f0f7ee;
            padding: 4px 8px;
            border-radius: 30px;
            display: inline-block;
        }

        /* 头像 */
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #2c6e2c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            object-fit: cover;
            background-size: cover;
            background-position: center;
        }

        /* 导师卡片横向滚动 */
        .mentor-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 16px;
            scrollbar-width: thin;
        }

        .mentor-card {
            min-width: 140px;
            background: #f8fcf7;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #d0e8d0;
            cursor: pointer;
        }
        .mentor-card:active {
            background-color: #e8f3e5;
        }

        /* 面试官卡片（新增） */
        .interviewer-card {
            min-width: 100px;
            background: #f8fcf7;
            border-radius: 24px;
            padding: 12px 8px;
            border: 1px solid #c8e0c8;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .interviewer-card.selected {
            background: #d9f0d9;
            border: 2px solid #2c6e2c;
        }
        .interviewer-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background-size: cover;
            background-position: center;
            background-color: #f0f7ee;
        }

        /* 论坛帖子项 */
        .forum-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #edf5eb;
            cursor: pointer;
        }
        .forum-item:active {
            background-color: #f8fcf7;
        }

        /* 按钮样式 */
        .btn-primary {
            background: #2c6e2c;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active {
            background: #1e4f1e;
        }

        .btn-outline {
            background: transparent;
            color: #2c6e2c;
            border: 2px solid #2c6e2c;
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        /* 输入框 */
        .input-field {
            width: 100%;
            padding: 16px;
            border: 1px solid #d0e0d0;
            border-radius: 30px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: #2c6e2c;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 40px;
            padding: 24px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2c6e2c;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* 评论区域 */
        .comment-item {
            padding: 16px 0;
            border-bottom: 1px solid #edf5eb;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #2c6e2c;
        }

        /* 积分徽章 */
        .points-badge {
            background: #2c6e2c;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 雷达图容器 */
        .radar-container {
            width: 100%;
            height: 250px;
            margin: 20px 0;
        }

        /* 开场动画遮罩层 */
.splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #f0f7ee 0%, #e0f0e0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    transition: opacity 0.6s ease-out;
}

.splash-logo {
    width: 140px;
    height: 140px;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    animation: logoPulse 1s ease-out;
}

.splash-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes logoPulse {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.splash-fade-out {
    opacity: 0;
    pointer-events: none;
}

@media (min-width: 900px) {
    body {
        align-items: center;
        padding: 24px;
    }

    .phone {
        max-width: 1180px;
        width: min(1180px, 100%);
        height: calc(100vh - 48px);
        min-height: 680px;
        flex-direction: row;
        border-radius: 18px;
        overflow: hidden;
    }

    .content {
        order: 2;
        padding: 32px 40px;
        max-width: 960px;
        margin: 0 auto;
    }

    .bottom-nav {
        order: 1;
        width: 220px;
        flex: 0 0 220px;
        height: 100%;
        flex-direction: column;
        justify-content: flex-start;
        align-items: stretch;
        gap: 6px;
        padding: 28px 16px;
        border-top: 0;
        border-right: 1px solid #e0f0e0;
        box-shadow: 2px 0 12px rgba(0,30,0,0.03);
    }

    .nav-item {
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        padding: 12px 14px;
        font-size: 14px;
        border-radius: 12px;
    }

    .nav-item i {
        width: 22px;
        font-size: 18px;
        text-align: center;
    }

    .nav-item.active {
        background: #e8f3e5;
    }

    .knowledge-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
    }

    .mentor-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: visible;
    }

    .mentor-card,
    .interviewer-card {
        min-width: 0;
    }
}
    </style>

        function showSplashScreen() {
    const splashDiv = document.createElement('div');
    splashDiv.className = 'splash-screen';

        // ==================== 初始化 ====================
        async function init() {
    // 先显示开场动画
    showSplashScreen();
    
    if (isDevPreview) {
        currentUser = getPreviewUser();
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        await loadInitialData();
        setTimeout(() => {
            renderMainApp();
            loadTabContent(previewTab);
            hideSplashScreen();
        }, 500);
        return;
    }

    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        await loadInitialData();
        // 延迟加载主界面，让动画播放完
        setTimeout(() => {
            renderMainApp();
            loadTabContent('home');
            hideSplashScreen();
        }, 1500);
    } else {
        // 延迟显示登录界面，让动画播放完
        setTimeout(() => {
            renderLogin();
            hideSplashScreen();
        }, 6000);
    }
}

        async function fetchArray(endpoint) {
            const response = await fetch(`${API_BASE}${endpoint}`);
            if (!response.ok) {
                throw new Error(`${endpoint} returned ${response.status}`);
            }

            const data = await response.json();
            if (!Array.isArray(data)) {
                throw new Error(`${endpoint} did not return an array`);
            }

            return data;
        }

        // ==================== 加载初始数据 ====================
        async function loadInitialData() {
            try {
                // 加载知识库

        // ==================== 登录界面 ====================
        function renderLogin() {

        // ==================== 注册界面 ====================
        function renderRegister() {

        // ==================== 处理登录 ====================
        async function handleLogin() {
            const username = document.getElementById('login-username')?.value;
            const password = document.getElementById('login-password')?.value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    await loadInitialData();
                    renderMainApp();
                    loadTabContent('home');
                } else {
                    alert(data.error || '登录失败');
                }
            } catch (error) {
                console.error('登录错误:', error);
                alert('登录失败，请检查网络');
            }
        }

        // ==================== 处理注册 ====================
        async function handleRegister() {
            const username = document.getElementById('register-username')?.value;
            const password = document.getElementById('register-password')?.value;
            const nickname = document.getElementById('register-nickname')?.value || username;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('注册成功，请登录');
                    renderLogin();
                } else {
                    alert(data.error || '注册失败');
                }
            } catch (error) {
                console.error('注册错误:', error);
                alert('注册失败，请检查网络');
            }
        }

        // ==================== 退出登录 ====================
        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            renderLogin();
        }

       // ==================== 渲染主应用 ====================
function renderMainApp() {

             // ========== 轮播控制代码（放在这里，在innerHTML赋值之后） ==========
    let currentIdx = 0;
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.carousel-dot');
    const prevBtn = document.querySelector('#main-content .carousel-arrow-left');
    const nextBtn = document.querySelector('#main-content .carousel-arrow-right');
    let autoTimer;

    function showSlide(index) {
        if (!slides.length) return;
        const newIdx = (index + slides.length) % slides.length;
        slides.forEach((s, i) => {
            s.style.opacity = i === newIdx ? '1' : '0';
        });
        dots.forEach((d, i) => {
            if (i === newIdx) {
                d.style.width = '20px';
                d.style.borderRadius = '4px';
                d.style.backgroundColor = '#2c6e2c';
            } else {
                d.style.width = '8px';
                d.style.borderRadius = '50%';
                d.style.backgroundColor = 'rgba(255,255,255,0.6)';
            }
        });
        currentIdx = newIdx;
    }

    function nextSlide() { showSlide(currentIdx + 1); }
    function prevSlide() { showSlide(currentIdx - 1); }

    function startAutoPlay() {
        if (autoTimer) clearInterval(autoTimer);
        autoTimer = setInterval(nextSlide, 4000);
    }

    function stopAutoPlay() { if (autoTimer) clearInterval(autoTimer); }

    if (slides.length) {
        startAutoPlay();
        if (prevBtn) prevBtn.addEventListener('click', () => { stopAutoPlay(); prevSlide(); startAutoPlay(); });
        if (nextBtn) nextBtn.addEventListener('click', () => { stopAutoPlay(); nextSlide(); startAutoPlay(); });
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = Array.from(dots).indexOf(e.target);
                if (idx !== -1) { stopAutoPlay(); showSlide(idx); startAutoPlay(); }
            });
        });
        const carousel = document.querySelector('.carousel-container');
        if (carousel) {
            carousel.addEventListener('mouseenter', stopAutoPlay);
            carousel.addEventListener('mouseleave', startAutoPlay);
        }
    }
}

        // ==================== 计算得分（优化版）====================
function calculateInterviewScore() {
    const answers = currentInterview.answers;
    if (!answers || answers.length === 0) return 0;
    
    let totalScore = 0;
    let answeredCount = 0;
    
    answers.forEach((ans) => {
        if (!ans || ans.trim() === '') return; // 没回答不计分
        
        answeredCount++;
        let qScore = 0;
        const answer = ans.toLowerCase();
        
        // 1. 基础分 - 有回答就给30分
        qScore += 30;
        
        // 2. 长度评分（表明回答详细程度）
        if (answer.length > 200) qScore += 25;
        else if (answer.length > 100) qScore += 20;
        else if (answer.length > 50) qScore += 15;
        else if (answer.length > 20) qScore += 10;
        
        // 3. 结构评分（使用STAR法则或分点）
        const structureIndicators = ['首先', '然后', '最后', '第一', '第二', '第三', '1.', '2.', '3.', '步骤', '方面'];
        let hasStructure = false;
        structureIndicators.forEach(word => {
            if (answer.includes(word)) hasStructure = true;
        });
        if (hasStructure) qScore += 10;
        
        // 4. 关键词评分（根据问题类型动态调整）
        const currentQuestion = currentInterview.questions[currentInterview.answers.indexOf(ans)] || '';
        
        // 根据不同问题类型赋予不同权重
        if (currentQuestion.includes('介绍') || currentQuestion.includes('自我介绍')) {
            const introKeywords = ['经验', '背景', '学历', '专业', '工作', '项目', '技能', '擅长'];
            introKeywords.forEach(kw => {
                if (answer.includes(kw)) qScore += 3;
            });
        } 
        else if (currentQuestion.includes('为什么') || currentQuestion.includes('原因')) {
            const reasonKeywords = ['因为', '所以', '因此', '导致', '影响', '因素', '考虑'];
            reasonKeywords.forEach(kw => {
                if (answer.includes(kw)) qScore += 4;
            });
        }
        else if (currentQuestion.includes('如何') || currentQuestion.includes('怎么')) {
            const methodKeywords = ['方法', '步骤', '首先', '然后', '最后', '通过', '采用'];
            methodKeywords.forEach(kw => {
                if (answer.includes(kw)) qScore += 4;
            });
        }
        else if (currentQuestion.includes('案例') || currentQuestion.includes('经历') || currentQuestion.includes('项目')) {
            const caseKeywords = ['项目', '负责', '完成', '实现', '结果', '效果', '提升', '降低', '增加'];
            caseKeywords.forEach(kw => {
                if (answer.includes(kw)) qScore += 4;
            });
        }
        
        // 5. 通用关键词评分
        const commonKeywords = ['项目', '经验', '学习', '团队', '解决', '方法', '结果', '目标', '计划', '实现'];
        commonKeywords.forEach(kw => {
            if (answer.includes(kw)) qScore += 2;
        });
        
        // 6. 具体性评分（包含数字、百分比、具体名词）
        const hasNumbers = /\d+/.test(answer);
        const hasPercentage = /%|百分之|百分点/.test(answer);
        const hasSpecific = /公司|部门|职位|岗位|工具|技术|软件/.test(answer);
        
        if (hasNumbers) qScore += 5;
        if (hasPercentage) qScore += 8;
        if (hasSpecific) qScore += 5;
        
        // 限制每题最高100分
        qScore = Math.min(qScore, 100);
        totalScore += qScore;
    });
    
    // 如果一题都没回答，返回0分
    if (answeredCount === 0) return 0;
    
    // 计算平均分
    return Math.round(totalScore / answeredCount);
}

// ==================== 获取优化建议（增强版）====================
function getOptimizeSuggestion(question, answer) {
    if (!answer || answer.trim() === '') {
        return '❌ 未作答。面试中一定要开口回答，哪怕简单说几句也比沉默好。';
    }
    
    const suggestions = [];
    const answerLower = answer.toLowerCase();
    
    // 长度建议
    if (answer.length < 30) {
        suggestions.push('📏 回答太简短，建议展开说明，增加细节和例子。');
    } else if (answer.length < 80) {
        suggestions.push('📏 回答可以更详细一些，尝试用2-3个点展开说明。');
    }
    
    // 结构建议
    const hasStructure = /首先|然后|最后|第一|第二|第三|1\.|2\.|3\.|步骤|方面/.test(answerLower);
    if (!hasStructure) {
        suggestions.push('📊 建议用"首先/其次/最后"或"第一/第二/第三"来组织语言，让回答更有条理。');
    }
    
    // 具体性建议
    const hasNumbers = /\d+/.test(answer);
    if (!hasNumbers) {
        suggestions.push('🔢 加入具体数字会让回答更有说服力（如：团队规模、项目时长、提升百分比等）。');
    }
    
    const hasExample = /例如|比如|案例|项目|经历/.test(answerLower);
    if (!hasExample && !question.includes('自我介绍')) {
        suggestions.push('💡 结合具体案例或项目经历，避免空泛的理论。');
    }
    
    // 问题特定建议
    if (question.includes('自我介绍')) {
        if (!answerLower.includes('经验') && !answerLower.includes('背景')) {
            suggestions.push('🎯 自我介绍应包含：教育背景、工作经历、核心技能、职业目标。');
        }
    } else if (question.includes('优缺点')) {
        if (!answerLower.includes('缺点') && !answerLower.includes('不足')) {
            suggestions.push('⚠️ 谈缺点时可以说一个真实的缺点，然后说明如何改进。');
        }
    } else if (question.includes('为什么')) {
        if (!answerLower.includes('因为') && !answerLower.includes('所以')) {
            suggestions.push('🤔 回答"为什么"类问题，要给出具体原因和动机。');
        }
    } else if (question.includes('如何') || question.includes('怎么')) {
        if (!answerLower.includes('步骤') && !answerLower.includes('方法')) {
            suggestions.push('📝 "如何"类问题要讲清楚方法和步骤。');
        }
    }
    
    // 关键词丰富度
    const keywords = ['项目', '经验', '学习', '团队', '解决', '方法', '结果'];
    let keywordCount = 0;
    keywords.forEach(kw => {
        if (answerLower.includes(kw)) keywordCount++;
    });
    if (keywordCount < 2) {
        suggestions.push('🔑 尝试使用更多关键词（项目、经验、团队、解决、结果等）。');
    }
    
    // 如果是优秀回答
    if (answer.length > 150 && hasStructure && keywordCount >= 3) {
        return '✨ 非常优秀的回答！结构清晰，内容详实，继续保持！';
    }
    
    // 如果回答很好但还有提升空间
    if (answer.length > 100 && hasStructure) {
        suggestions.push('👍 整体不错，可以再增加一些具体案例和数据支撑。');
    }
    
    return suggestions.length > 0 
        ? suggestions.map(s => '• ' + s).join('<br>')
        : '✅ 回答基本合格，按照建议优化会更好！';
}

        return `<p style="color: #2c6e2c;">🎉 优秀！得分: ${score}分。回答很有条理，稍加优化即可达到卓越水平。</p>`;

    } else if (score >= 60) {
        return `<p style="color: #f5b342;">📝 及格！得分: ${score}分。回答完整但缺乏亮点，尝试用STAR法则优化。</p>`;

    }
}

        // ==================== 提交预约 ====================
        async function submitBooking(mentorId, type) {
            const time = document.getElementById('booking-time')?.value;
            const message = document.getElementById('booking-message')?.value;

            if (!time) {
                alert('请选择预约时间');
                return;
            }

            if ((currentUser?.points || 0) < 50) {
                alert('积分不足，请先获取积分（发帖、评论可得积分）');
                document.querySelector('.modal')?.remove();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        mentorId: mentorId,
                        type: type,
                        time: time
                    })
                });

                if (response.ok) {
                    alert('预约成功！已扣除50积分');
                    
                    currentUser.points -= 50;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    document.querySelector('.modal')?.remove();
                } else {
                    alert('预约失败，请重试');
                }
            } catch (error) {
                console.error('预约失败:', error);
                alert('预约失败，请检查网络');
            }
        }

// 辅助函数：根据分数获取颜色
function getScoreColor(score) {
    if (score >= 85) return '#2c6e2c';
    if (score >= 70) return '#f5b342';
    return '#c00';
}

// 辅助函数：根据等级获取颜色
function getLevelColor(level) {
    if (level === '卓越') return '#2c6e2c';
    if (level === '高级') return '#2c6e2c';
    if (level === '中级') return '#f5b342';
    return '#c00';
}

    }
}

                .switch input {
                    opacity: 0;
                    width: 0;
                    height: 0;
                }
                .slider {
                    position: absolute;
                    cursor: pointer;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background-color: #ccc;
                    transition: .4s;
                    border-radius: 34px;
                }
                .slider:before {
                    position: absolute;
                    content: "";
                    height: 20px;
                    width: 20px;
                    left: 2px;
                    bottom: 2px;
                    background-color: white;
                    transition: .4s;
                    border-radius: 50%;
                }
                input:checked + .slider {
                    background-color: #2c6e2c;
                }
                input:checked + .slider:before {
                    transform: translateX(26px);
                }
            `;
            document.head.appendChild(style);
        }

// 渲染论坛主页面
function renderForum(container) {

        <div style="padding: 8px 0 20px;">
            <div class="section-title">
                <i class="fas fa-comments"></i> 求职论坛
                <span style="margin-left: auto;">

                        <i class="fas fa-pen"></i> 发帖
                    </button>
                </span>
            </div>
            
            <!-- 搜索框 -->
            <div style="background: #f0f7ee; border-radius: 40px; padding: 12px 18px; margin-bottom: 20px; display: flex; gap: 10px;">
                <i class="fas fa-search" style="color: #2c6e2c;"></i>
                <input type="text" id="search-forum" placeholder="搜索帖子..." style="border: none; background: transparent; width: 100%; outline: none;">
            </div>

            <!-- 分类标签 -->
            <div style="display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;">
                <span class="company-tag" onclick="filterForum('all')">全部</span>
                <span class="company-tag" onclick="filterForum('面经')">面经</span>
                <span class="company-tag" onclick="filterForum('求助')">求助</span>
                <span class="company-tag" onclick="filterForum('吐槽')">吐槽</span>
                <span class="company-tag" onclick="filterForum('招聘')">招聘</span>
            </div>

            <!-- 帖子列表 -->
            <div id="forum-posts-list">
                ${forumPosts.map(post => renderForumPost(post)).join('')}
            </div>
        </div>
    `;

    // 搜索功能
    document.getElementById('search-forum')?.addEventListener('input', function(e) {
        const keyword = e.target.value.toLowerCase();
        const filtered = forumPosts.filter(post => 
            post.title?.toLowerCase().includes(keyword) ||
            post.content?.toLowerCase().includes(keyword)
        );
        document.getElementById('forum-posts-list').innerHTML = filtered.map(p => renderForumPost(p)).join('');
    });
}

// 渲染单个帖子项
function renderForumPost(post) {
    return `
        <div class="card" style="cursor: pointer; margin-bottom: 12px;" onclick="showPostDetail(${post.id})">
            <div style="display: flex; justify-content: space-between;">
                <span class="company-tag">${post.category || '面经'}</span>
                <span style="color: #8aa08a; font-size: 12px;">${new Date(post.created_at || Date.now()).toLocaleDateString()}</span>
            </div>
            <div style="font-weight: 600; font-size: 16px; margin: 8px 0;">${post.title}</div>
            <div style="color: #4f6b4f; margin-bottom: 12px;">${(post.content || '').substring(0, 60)}...</div>
            <div style="display: flex; gap: 16px; font-size: 12px; color: #8aa08a;">
                <span><i class="fas fa-user"></i> ${post.author_name || '匿名'}</span>
                <span><i class="fas fa-comment"></i> ${post.reply_count || 0} 回复</span>
                <span><i class="fas fa-heart"></i> ${post.likes || 0} 点赞</span>
            </div>
        </div>
    `;
}

// 显示帖子详情

        { id: 2, user: '求职小白', content: '请问具体怎么准备呢？', time: '2026-03-06', likes: 1 }

                        <div style="font-weight: 600;">${post.author_name || '匿名用户'}</div>
                        <div style="font-size: 12px; color: #8aa08a;">积分 ${post.author_points || 100}</div>
                    </div>
                </div>

                <div style="background: #f8fcf7; padding: 20px; border-radius: 16px; margin: 16px 0; white-space: pre-line;">
                    ${post.content || '暂无内容'}
                </div>

                <div style="display: flex; gap: 20px; margin: 20px 0;">
                    <span style="cursor: pointer;" onclick="likePost(${post.id})">

                    </span>
                    <span style="cursor: pointer;" onclick="collectPost(${post.id})">

                    </span>
                    <span style="cursor: pointer;" onclick="sharePost(${post.id})">
                        <i class="fas fa-share" style="color: #2c6e2c;"></i> 分享
                    </span>

                    <div style="flex: 1;">

                        <button class="btn-primary" style="padding: 10px;" onclick="postComment(${post.id})">发表评论</button>

                        <div style="display: flex; gap: 12px;">
                            <div class="avatar" style="width: 32px; height: 32px; font-size: 16px;">${comment.user.charAt(0)}</div>

                                </div>

                                    <span style="cursor: pointer;" onclick="replyComment(${comment.id})">

// 提交新帖子
async function submitNewPost() {
    const category = document.getElementById('post-category')?.value;
    const title = document.getElementById('post-title')?.value;
    const content = document.getElementById('post-content')?.value;

    if (!title || !content) {
        alert('请填写标题和内容');
        return;
    }

    const newPost = {
        id: forumPosts.length + 1,
        title: title,
        content: content,
        category: category,
        author_name: currentUser?.nickname || currentUser?.username,
        author_id: currentUser?.id,
        reply_count: 0,
        likes: 0,
        created_at: new Date(),
        comments: []
    };

    forumPosts.unshift(newPost);
    
    // 增加用户积分
    if (currentUser) {
        currentUser.points = (currentUser.points || 0) + 20;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
    }

    alert('发布成功！获得20积分');
    renderForum(document.getElementById('main-content'));
}

// 筛选论坛帖子
function filterForum(category) {
    if (category === 'all') {
        document.getElementById('forum-posts-list').innerHTML = forumPosts.map(p => renderForumPost(p)).join('');
    } else {
        const filtered = forumPosts.filter(p => p.category === category);
        document.getElementById('forum-posts-list').innerHTML = filtered.map(p => renderForumPost(p)).join('');
    }
    
    document.querySelectorAll('.company-tag').forEach(tag => {
        tag.style.background = tag.innerText === category ? '#2c6e2c' : '#e8f3e5';
        tag.style.color = tag.innerText === category ? 'white' : '#2c6e2c';
    });
}
